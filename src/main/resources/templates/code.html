<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Código de verificación</title>
</head>
<body style="margin:0;padding:0;background:#0d0d0d;font-family:system-ui,-apple-system,sans-serif;">

<table width="100%" cellpadding="0" cellspacing="0" style="background:#0d0d0d;padding:40px 16px;">
    <tr>
        <td align="center">

            <table width="420" cellpadding="0" cellspacing="0" style="background:#161616;border-radius:20px;border:1px solid #2a2a2a;padding:40px 32px;max-width:420px;">

                <!-- Icono -->
                <tr>
                    <td align="center" style="padding-bottom:12px;">
                        <table cellpadding="0" cellspacing="0">
                            <tr>
                                <td style="background:#1f1f1f;border:1px solid #2e2e2e;border-radius:12px;width:48px;height:48px;text-align:center;vertical-align:middle;">
                                    <img src="https://img.icons8.com/ios/50/666666/lock--v1.png" width="22" height="22" alt="lock" style="display:block;margin:13px auto;" />
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>

                <!-- Título -->
                <tr>
                    <td align="center" style="padding-bottom:8px;">
                        <span style="font-size:17px;font-weight:500;color:#f0f0f0;">Verificación de seguridad</span>
                    </td>
                </tr>

                <!-- Subtítulo -->
                <tr>
                    <td align="center" style="padding-bottom:32px;">
                        <span style="font-size:13px;color:#555;line-height:1.6;">Ingresa este código para confirmar tu identidad.<br/>Expira en 10 minutos.</span>
                    </td>
                </tr>

                <!-- Dígitos -->
                <tr>
                    <td align="center" style="padding-bottom:32px;">
                        <table cellpadding="0" cellspacing="0">
                            <tr>
                                {{code}}
                            </tr>
                        </table>
                    </td>
                </tr>

                <!-- Footer -->
                <tr>
                    <td align="center" style="border-top:1px solid #1e1e1e;padding-top:24px;">
              <span style="font-size:12px;color:#3a3a3a;line-height:1.6;">
                Si no solicitaste este código, puedes ignorar este mensaje.<br/>
                No compartas este código con nadie.
              </span>
                    </td>
                </tr>

            </table>
        </td>
    </tr>
</table>

</body>
</html>
